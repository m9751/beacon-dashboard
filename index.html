<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>Beacon Dashboard — SmokinTerritory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --accent: #00ff87;
  --accent2: #ff6b35;
  --accent3: #7b61ff;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --danger: #ff4466;
  --warning: #ffaa00;
  --radius: 2px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,135,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,135,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
.container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }

/* Header */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
.eyebrow { font-size: 10px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
h1 { font-family: 'Syne', sans-serif; font-size: clamp(24px, 5vw, 42px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; }
h1 span { color: var(--accent); }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 12px; border: 1px solid rgba(0,255,135,0.2); border-radius: var(--radius); white-space: nowrap; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

/* Nav tabs */
.nav-tabs { display: flex; gap: 4px; margin-bottom: 32px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.nav-tab {
  padding: 10px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  bottom: -1px;
}
.nav-tab:hover { color: var(--accent); }
.nav-tab.active {
  color: var(--accent);
  background: var(--surface);
  border-color: var(--border);
  border-bottom: 1px solid var(--bg);
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; background: var(--surface); border: 1px solid var(--border); }
.data-table th {
  font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
  padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.3); position: sticky; top: 0;
}
.data-table td { padding: 10px 14px; border-bottom: 1px solid rgba(30,30,46,0.5); vertical-align: top; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,255,135,0.02); }

/* Badges */
.badge { font-size: 9px; padding: 3px 8px; border-radius: 1px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; display: inline-block; }
.badge-green { background: rgba(0,255,135,0.1); color: var(--accent); border: 1px solid rgba(0,255,135,0.2); }
.badge-orange { background: rgba(255,107,53,0.1); color: var(--accent2); border: 1px solid rgba(255,107,53,0.2); }
.badge-purple { background: rgba(123,97,255,0.1); color: var(--accent3); border: 1px solid rgba(123,97,255,0.2); }
.badge-red { background: rgba(255,68,102,0.1); color: var(--danger); border: 1px solid rgba(255,68,102,0.2); }
.badge-muted { background: rgba(90,90,122,0.1); color: var(--muted); border: 1px solid var(--border); }
.badge-warn { background: rgba(255,170,0,0.1); color: var(--warning); border: 1px solid rgba(255,170,0,0.2); }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); padding: 18px;
  position: relative; overflow: hidden;
  opacity: 0; animation: fadeUp 0.4s ease forwards;
}
.stat-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent); }
.stat-card.orange::before { background: var(--accent2); }
.stat-card.purple::before { background: var(--accent3); }
.stat-card.red::before { background: var(--danger); }
.stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* Section title */
.section-title {
  font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase;
  margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* Proposal-specific */
.selector-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.selector-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
.pill {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer;
  background: transparent; color: var(--muted); transition: all 0.15s; letter-spacing: 0.05em;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,135,0.06); }

/* Session blocks */
.session-block { background: var(--surface); border: 1px solid var(--border); margin-bottom: 6px; overflow: hidden; opacity:0; animation: fadeUp 0.4s ease forwards; }
.session-header { display:flex; align-items:center; gap:14px; padding:12px 16px; cursor:pointer; transition:background 0.15s; }
.session-header:hover { background: rgba(255,255,255,0.02); }
.session-time { font-size:11px; color:var(--accent); min-width:150px; letter-spacing:0.05em; }
.session-meta { flex:1; font-size:12px; }
.session-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.session-chevron { color:var(--muted); font-size:10px; transition:transform 0.2s; }
.session-block.open .session-chevron { transform:rotate(90deg); }
.session-slides { display:none; border-top:1px solid var(--border); padding:10px 16px; }
.session-block.open .session-slides { display:block; }
.slide-row { display:flex; align-items:center; gap:12px; padding:5px 0; border-bottom:1px solid rgba(30,30,46,0.5); font-size:11px; }
.slide-row:last-child { border-bottom:none; }
.slide-num { color:var(--muted); min-width:24px; font-size:10px; }
.slide-title { flex:1; }
.slide-duration { font-size:10px; padding:2px 8px; background:rgba(0,255,135,0.06); color:var(--accent); border-radius:1px; min-width:50px; text-align:right; }
.slide-duration.high { background:rgba(255,170,0,0.08); color:var(--warning); }

/* Heatmap */
.heatmap-row { display:flex; align-items:center; gap:12px; margin-bottom:6px; opacity:0; animation:fadeUp 0.3s ease forwards; }
.heatmap-label { font-size:10px; color:var(--muted); min-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.heatmap-bar-wrap { flex:1; height:18px; background:rgba(30,30,46,0.5); }
.heatmap-bar { height:100%; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }
.heatmap-bar.top { background:var(--accent); }
.heatmap-bar.hot { background:var(--accent2); }
.heatmap-bar.default { background:var(--accent3); }
.heatmap-count { font-size:10px; color:var(--muted); min-width:30px; text-align:right; }

/* IP table */
.ip-cell { font-family:'DM Mono',monospace; color:var(--accent2); }
.ua-cell { color:var(--muted); font-size:10px; max-width:300px; word-break:break-all; }
.count-cell { color:var(--accent); font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }

/* Loading / Error / Empty */
.state-msg { display:flex; align-items:center; justify-content:center; min-height:200px; flex-direction:column; gap:14px; }
.loading-bar { width:200px; height:2px; background:var(--border); position:relative; overflow:hidden; }
.loading-bar::after { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:var(--accent); animation:slide 1.2s infinite; }
@keyframes slide { to{left:100%} }
.loading-text { font-size:11px; color:var(--muted); letter-spacing:0.2em; }
.error-text { font-size:12px; color:var(--danger); letter-spacing:0.05em; }
.empty-text { font-size:12px; color:var(--muted); letter-spacing:0.05em; }

/* Footer */
.footer { margin-top:40px; padding-top:20px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
.footer-left { font-size:10px; color:var(--muted); letter-spacing:0.1em; }

/* Urgency colors */
.urgency-10 { color: var(--danger); font-weight: 500; }
.urgency-9 { color: var(--accent2); font-weight: 500; }
.urgency-8 { color: var(--warning); }
.urgency-7 { color: var(--accent); }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 20px 12px; }
  .nav-tab { padding: 8px 12px; font-size: 10px; }
  .data-table { font-size: 11px; display: block; overflow-x: auto; }
  .heatmap-label { min-width: 120px; }
  .session-time { min-width: 100px; font-size: 10px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr; }
  .nav-tabs { gap: 2px; }
  .nav-tab { padding: 8px 10px; font-size: 9px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="eyebrow">SmokinTerritory // Outreach Intelligence</div>
      <h1>Beacon <span>Dashboard</span></h1>
    </div>
    <div class="live-badge"><div class="live-dot"></div> Live Data</div>
  </div>

  <nav class="nav-tabs" role="tablist">
    <button class="nav-tab active" role="tab" onclick="switchTab('pipeline')">Pipeline</button>
    <button class="nav-tab" role="tab" onclick="switchTab('signals')">Signals</button>
    <button class="nav-tab" role="tab" onclick="switchTab('campaign')">Campaign</button>
    <button class="nav-tab" role="tab" onclick="switchTab('proposals')">Proposals</button>
    <button class="nav-tab" role="tab" onclick="switchTab('system')">System</button>
  </nav>

  <!-- PIPELINE TAB -->
  <section id="tab-pipeline" class="tab-content active">
    <div id="pipeline-content" class="state-msg">
      <div class="loading-bar"></div>
      <div class="loading-text">Loading pipeline...</div>
    </div>
  </section>

  <!-- SIGNALS TAB -->
  <section id="tab-signals" class="tab-content">
    <div id="signals-content" class="state-msg">
      <div class="loading-bar"></div>
      <div class="loading-text">Loading signals...</div>
    </div>
  </section>

  <!-- CAMPAIGN TAB -->
  <section id="tab-campaign" class="tab-content">
    <div id="campaign-content" class="state-msg">
      <div class="loading-bar"></div>
      <div class="loading-text">Loading campaign data...</div>
    </div>
  </section>

  <!-- PROPOSALS TAB -->
  <section id="tab-proposals" class="tab-content">
    <div id="proposals-content" class="state-msg">
      <div class="loading-bar"></div>
      <div class="loading-text">Loading proposals...</div>
    </div>
  </section>

  <!-- SYSTEM TAB -->
  <section id="tab-system" class="tab-content">
    <div id="system-content" class="state-msg">
      <div class="loading-bar"></div>
      <div class="loading-text">Loading system status...</div>
    </div>
  </section>

  <div class="footer">
    <div class="footer-left">SMOKINTERRITORY // BEACON DASHBOARD v2.0</div>
    <div class="footer-left" id="footer-time"></div>
  </div>
</div>

<script>
const SB_URL = 'https://cnplogkxbjecdeeritdl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNucGxvZ2t4YmplY2RlZXJpdGRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMjAzMTUsImV4cCI6MjA4Nzg5NjMxNX0.WJ6edMljHiY-fku9G2OWm83y5wHWI5yZHvxtpYMCuWU';
const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

// ── Utility ──
function esc(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', timeZone:'America/New_York' });
}

function fmtTime(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true, timeZone:'America/New_York' }) + ' ET';
}

function fmtDuration(secs) {
  if (!secs) return null;
  var s = parseFloat(secs);
  if (s > 3600) return Math.round(s/3600) + 'h';
  if (s > 60) return Math.round(s/60) + 'm';
  return Math.round(s) + 's';
}

async function sbFetch(table, params) {
  var url = SB_URL + '/rest/v1/' + table + '?' + params;
  var r = await fetch(url, { headers: HEADERS });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function renderLoading(el) {
  el.className = 'state-msg';
  el.innerHTML = '<div class="loading-bar"></div><div class="loading-text">Loading...</div>';
}

function renderError(el, msg) {
  el.className = 'state-msg';
  el.innerHTML = '<div class="error-text">' + esc(msg) + '</div>';
}

function renderEmpty(el, msg) {
  el.className = 'state-msg';
  el.innerHTML = '<div class="empty-text">' + esc(msg || 'No data available') + '</div>';
}

// ── Tab switching ──
var currentTab = 'pipeline';

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  var tabs = document.querySelectorAll('.nav-tab');
  var names = ['pipeline','signals','campaign','proposals','system'];
  var idx = names.indexOf(name);
  if (idx >= 0 && tabs[idx]) tabs[idx].classList.add('active');
  history.replaceState(null, '', '?tab=' + name);
}

// ── PIPELINE ──
async function loadPipeline() {
  var el = document.getElementById('pipeline-content');
  try {
    var data = await sbFetch('deals', 'status=eq.active&order=next_action_date.asc');
    if (!data || data.length === 0) { renderEmpty(el, 'No active deals in pipeline'); return; }
    el.className = '';
    var html = '<div class="section-title">Active Deals</div>';
    html += '<table class="data-table"><thead><tr>';
    html += '<th>Account</th><th>Stage</th><th>Amount</th><th>Next Action</th><th>Due</th><th>Close</th><th>Contact</th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var due = d.next_action_date ? new Date(d.next_action_date) : null;
      var overdue = due && due < new Date();
      html += '<tr style="animation-delay:' + (i*0.05) + 's;opacity:0;animation:fadeUp 0.4s ease forwards">';
      html += '<td style="font-weight:500">' + esc(d.account_name) + '</td>';
      html += '<td><span class="badge badge-purple">' + esc(d.stage) + '</span></td>';
      html += '<td style="color:var(--accent);font-family:Syne,sans-serif;font-weight:800">' + (d.amount ? '$' + Number(d.amount).toLocaleString() : '—') + '</td>';
      html += '<td>' + esc(d.next_action || '—') + '</td>';
      html += '<td style="color:' + (overdue ? 'var(--danger)' : 'var(--text)') + '">' + fmtDate(d.next_action_date) + '</td>';
      html += '<td>' + fmtDate(d.target_close_date) + '</td>';
      html += '<td style="color:var(--muted)">' + esc(d.primary_contact || '—') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    if (data.some(function(d) { return d.notes; })) {
      html += '<div class="section-title" style="margin-top:24px">Deal Notes</div>';
      html += '<div style="background:var(--surface);border:1px solid var(--border);padding:14px;">';
      for (var j = 0; j < data.length; j++) {
        if (data[j].notes) {
          html += '<div style="margin-bottom:10px;font-size:11px"><span style="color:var(--accent)">' + esc(data[j].account_name) + ':</span> ' + esc(data[j].notes) + '</div>';
        }
      }
      html += '</div>';
    }
    el.innerHTML = html;
  } catch (e) {
    console.error('Pipeline error:', e);
    renderError(el, 'Failed to load pipeline: ' + e.message);
  }
}

// ── SIGNALS ──
async function loadSignals() {
  var el = document.getElementById('signals-content');
  try {
    var cutoff = new Date(Date.now() - 7*24*60*60*1000).toISOString();
    var data = await sbFetch('signal_events',
      'created_at=gte.' + cutoff +
      '&urgency=gte.7' +
      '&signal_type=neq.proposal_engagement' +
      '&order=urgency.desc,created_at.desc' +
      '&limit=100'
    );
    if (!data || data.length === 0) { renderEmpty(el, 'No high-urgency signals in the last 7 days'); return; }
    el.className = '';
    var html = '<div class="stats-row">';
    var u10 = data.filter(function(s){return s.urgency>=10}).length;
    var u9 = data.filter(function(s){return s.urgency===9}).length;
    var u8 = data.filter(function(s){return s.urgency===8}).length;
    var u7 = data.filter(function(s){return s.urgency===7}).length;
    html += '<div class="stat-card red" style="animation-delay:0s"><div class="stat-label">Urgency 10</div><div class="stat-value">' + u10 + '</div></div>';
    html += '<div class="stat-card orange" style="animation-delay:0.08s"><div class="stat-label">Urgency 9</div><div class="stat-value">' + u9 + '</div></div>';
    html += '<div class="stat-card" style="animation-delay:0.16s;--accent:var(--warning)"><div class="stat-label">Urgency 8</div><div class="stat-value">' + u8 + '</div><div class="stat-card::before" style="background:var(--warning)"></div></div>';
    html += '<div class="stat-card" style="animation-delay:0.24s"><div class="stat-label">Urgency 7</div><div class="stat-value">' + u7 + '</div></div>';
    html += '</div>';
    html += '<div class="section-title">Signals (Last 7 Days, Urgency >= 7)</div>';
    html += '<table class="data-table"><thead><tr>';
    html += '<th>Account</th><th>Type</th><th>Headline</th><th>Urg</th><th>Fired</th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < data.length; i++) {
      var s = data[i];
      var uClass = 'urgency-' + Math.min(s.urgency, 10);
      html += '<tr style="animation-delay:' + (i*0.03) + 's;opacity:0;animation:fadeUp 0.4s ease forwards">';
      html += '<td style="font-weight:500">' + esc(s.account_name) + '</td>';
      html += '<td><span class="badge badge-orange">' + esc(s.signal_type) + '</span></td>';
      html += '<td style="max-width:350px">' + esc(s.headline) + '</td>';
      html += '<td class="' + uClass + '">' + s.urgency + '</td>';
      html += '<td style="color:var(--muted)">' + fmtTime(s.signal_date || s.created_at) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch (e) {
    console.error('Signals error:', e);
    renderError(el, 'Failed to load signals: ' + e.message);
  }
}

// ── CAMPAIGN ──
async function loadCampaign() {
  var el = document.getElementById('campaign-content');
  try {
    var data = await sbFetch('v_campaign_coordination', 'order=campaign_status.asc,composite_score.desc&limit=100');
    if (!data || data.length === 0) { renderEmpty(el, 'No campaign coordination data'); return; }
    el.className = '';
    var statusOrder = {'ESCALATE':0,'READY':1,'NURTURE':2,'MONITOR':3,'DORMANT':4};
    data.sort(function(a,b) {
      var sa = statusOrder[a.campaign_status] != null ? statusOrder[a.campaign_status] : 99;
      var sb2 = statusOrder[b.campaign_status] != null ? statusOrder[b.campaign_status] : 99;
      if (sa !== sb2) return sa - sb2;
      return (b.composite_score||0) - (a.composite_score||0);
    });
    var html = '<div class="section-title">Campaign Coordination</div>';
    html += '<table class="data-table"><thead><tr>';
    html += '<th>Account</th><th>Status</th><th>Top Signal</th><th>Pending</th><th>Contacts</th><th>WARN</th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < data.length; i++) {
      var c = data[i];
      if (!c.account_name) continue;
      var statusBadge = 'badge-muted';
      if (c.campaign_status === 'ESCALATE') statusBadge = 'badge-red';
      else if (c.campaign_status === 'READY') statusBadge = 'badge-green';
      else if (c.campaign_status === 'NURTURE') statusBadge = 'badge-purple';
      else if (c.campaign_status === 'MONITOR') statusBadge = 'badge-warn';
      html += '<tr style="animation-delay:' + (i*0.02) + 's;opacity:0;animation:fadeUp 0.3s ease forwards">';
      html += '<td style="font-weight:500">' + esc(c.account_name) + '</td>';
      html += '<td><span class="badge ' + statusBadge + '">' + esc(c.campaign_status || '—') + '</span></td>';
      html += '<td style="max-width:300px;font-size:11px">' + esc(c.top_pending_signal || '—') + '</td>';
      html += '<td style="text-align:center">' + (c.signals_pending || 0) + '</td>';
      html += '<td style="text-align:center">' + (c.apollo_contact_count || 0) + '</td>';
      html += '<td style="text-align:center">' + (c.warn_count > 0 ? '<span class="badge badge-red">' + c.warn_count + '</span>' : '—') + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch (e) {
    console.error('Campaign error:', e);
    renderError(el, 'Failed to load campaign data: ' + e.message);
  }
}

// ── PROPOSALS ──
var currentProposal = null;
var proposalIds = [];

async function loadProposals() {
  var el = document.getElementById('proposals-content');
  try {
    var all = await sbFetch('v_proposal_engagement_clean', 'select=proposal_id&order=proposal_id&limit=500');
    var seen = {};
    proposalIds = [];
    for (var i = 0; i < all.length; i++) {
      if (!seen[all[i].proposal_id]) { proposalIds.push(all[i].proposal_id); seen[all[i].proposal_id] = true; }
    }
    if (proposalIds.length === 0) { renderEmpty(el, 'No proposal engagement data'); return; }
    currentProposal = currentProposal || proposalIds[0];
    renderProposalShell(el);
    loadProposalData(currentProposal);
  } catch (e) {
    console.error('Proposals error:', e);
    renderError(el, 'Failed to load proposals: ' + e.message);
  }
}

function renderProposalShell(el) {
  el.className = '';
  var html = '<div class="selector-bar"><span class="selector-label">PROPOSAL //</span>';
  for (var i = 0; i < proposalIds.length; i++) {
    var active = proposalIds[i] === currentProposal ? ' active' : '';
    html += '<button class="pill' + active + '" onclick="selectProposal(\'' + esc(proposalIds[i]) + '\')">' + esc(proposalIds[i]) + '</button>';
  }
  html += '</div><div id="proposal-data" class="state-msg"><div class="loading-bar"></div><div class="loading-text">Loading ' + esc(currentProposal) + '...</div></div>';
  el.innerHTML = html;
}

function selectProposal(id) {
  currentProposal = id;
  document.querySelectorAll('#tab-proposals .pill').forEach(function(p) { p.classList.remove('active'); });
  var btns = document.querySelectorAll('#tab-proposals .pill');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].textContent === id) btns[i].classList.add('active');
  }
  var dataEl = document.getElementById('proposal-data');
  renderLoading(dataEl);
  loadProposalData(id);
}

async function loadProposalData(proposalId) {
  var el = document.getElementById('proposal-data');
  try {
    var events = await sbFetch('v_proposal_engagement_clean', 'proposal_id=eq.' + encodeURIComponent(proposalId) + '&order=created_at.desc&limit=500');
    if (!events || events.length === 0) { renderEmpty(el, 'No engagement data for ' + proposalId); return; }
    el.className = '';

    // Group by session
    var sessions = {};
    for (var i = 0; i < events.length; i++) {
      var e = events[i];
      if (!sessions[e.session_id]) sessions[e.session_id] = [];
      sessions[e.session_id].push(e);
    }
    var sessionList = Object.entries(sessions).sort(function(a,b) {
      return new Date(b[1][0].created_at) - new Date(a[1][0].created_at);
    });

    // Stats
    var totalSessions = sessionList.length;
    var slideViews = events.filter(function(e){return e.event_type==='slide_viewed' && e.slide_number>0}).length;
    var uniqueIPs = {};
    events.forEach(function(e){if(e.visitor_ip) uniqueIPs[e.visitor_ip]=true});
    var ipCount = Object.keys(uniqueIPs).length;
    var deepReads = sessionList.filter(function(pair) {
      var u = {};
      pair[1].forEach(function(s){if(s.slide_number>0) u[s.slide_number]=true});
      return Object.keys(u).length >= 5;
    }).length;

    var html = '<div class="stats-row">';
    html += '<div class="stat-card" style="animation-delay:0s"><div class="stat-label">Sessions</div><div class="stat-value">' + totalSessions + '</div></div>';
    html += '<div class="stat-card orange" style="animation-delay:0.08s"><div class="stat-label">Slide Views</div><div class="stat-value">' + slideViews + '</div></div>';
    html += '<div class="stat-card purple" style="animation-delay:0.16s"><div class="stat-label">Deep Reads</div><div class="stat-value">' + deepReads + '</div></div>';
    html += '<div class="stat-card red" style="animation-delay:0.24s"><div class="stat-label">Unique IPs</div><div class="stat-value">' + ipCount + '</div></div>';
    html += '</div>';

    // Session timeline
    html += '<div class="section-title">Session Timeline</div>';
    for (var j = 0; j < sessionList.length; j++) {
      var sid = sessionList[j][0];
      var slides = sessionList[j][1];
      var sorted = slides.slice().sort(function(a,b){return new Date(a.created_at)-new Date(b.created_at)});
      var first = sorted[0];
      var viewed = slides.filter(function(s){return s.event_type==='slide_viewed' && s.slide_number>0});
      var timeEvts = slides.filter(function(s){return s.event_type==='time_on_slide'});
      var uniq = {};
      viewed.forEach(function(s){uniq[s.slide_number]=s});
      var uniqueCount = Object.keys(uniq).length;
      var ip = first.visitor_ip || 'No IP';

      var badgeHtml = '';
      if (uniqueCount >= 5) badgeHtml = '<span class="badge badge-purple">Deep Read</span>';
      else if (uniqueCount >= 2) badgeHtml = '<span class="badge badge-green">Browsed</span>';
      else badgeHtml = '<span class="badge badge-muted">Cover Only</span>';

      var slideRows = Object.values(uniq).sort(function(a,b){return a.slide_number-b.slide_number}).map(function(s) {
        var dwell = timeEvts.find(function(t){return t.slide_number===s.slide_number});
        var dur = dwell ? fmtDuration(dwell.duration_seconds) : null;
        var isHigh = dwell && parseFloat(dwell.duration_seconds) > 5;
        return '<div class="slide-row"><span class="slide-num">' + s.slide_number + '</span><span class="slide-title">' + esc(s.slide_title || 'Slide ' + s.slide_number) + '</span>' +
          (dur ? '<span class="slide-duration' + (isHigh?' high':'') + '">' + dur + '</span>' : '<span class="slide-duration" style="color:var(--border)">—</span>') + '</div>';
      }).join('');

      html += '<div class="session-block" style="animation-delay:' + (j*0.04) + 's" onclick="this.classList.toggle(\'open\')">';
      html += '<div class="session-header"><div class="session-time">' + fmtTime(first.created_at) + '</div>';
      html += '<div class="session-meta">' + (uniqueCount > 0 ? uniqueCount + ' slide' + (uniqueCount>1?'s':'') + ' viewed' : 'Cover only');
      html += '<div class="session-sub">' + esc(ip) + '</div></div>';
      html += badgeHtml + '<span class="session-chevron">&#9654;</span></div>';
      if (slideRows) html += '<div class="session-slides">' + slideRows + '</div>';
      html += '</div>';
    }

    // Slide heatmap
    var slideCounts = {};
    for (var k = 0; k < events.length; k++) {
      var ev = events[k];
      if (ev.event_type === 'slide_viewed' && ev.slide_number > 0) {
        if (!slideCounts[ev.slide_number]) slideCounts[ev.slide_number] = { count:0, title:'' };
        slideCounts[ev.slide_number].count++;
        slideCounts[ev.slide_number].title = ev.slide_title || 'Slide ' + ev.slide_number;
      }
    }
    var slideArr = Object.entries(slideCounts).sort(function(a,b){return b[1].count-a[1].count});
    if (slideArr.length > 0) {
      var maxC = slideArr[0][1].count;
      html += '<div class="section-title" style="margin-top:24px">Slide Attention Heatmap</div>';
      html += '<div style="background:var(--surface);border:1px solid var(--border);padding:16px;">';
      for (var m = 0; m < Math.min(slideArr.length, 15); m++) {
        var pct = Math.round((slideArr[m][1].count / maxC) * 100);
        var barClass = m === 0 ? 'top' : pct >= 60 ? 'hot' : 'default';
        html += '<div class="heatmap-row" style="animation-delay:' + (m*0.04) + 's">';
        html += '<div class="heatmap-label">' + slideArr[m][0] + '. ' + esc(slideArr[m][1].title) + '</div>';
        html += '<div class="heatmap-bar-wrap"><div class="heatmap-bar ' + barClass + '" style="width:' + pct + '%"></div></div>';
        html += '<div class="heatmap-count">' + slideArr[m][1].count + '</div></div>';
      }
      html += '</div>';
    }

    // Viewer fingerprints
    var ipCounts = {};
    var ipAgents = {};
    events.forEach(function(ev2) {
      if (ev2.visitor_ip) {
        ipCounts[ev2.visitor_ip] = (ipCounts[ev2.visitor_ip]||0) + 1;
        ipAgents[ev2.visitor_ip] = ev2.user_agent;
      }
    });
    var ipArr = Object.entries(ipCounts).sort(function(a,b){return b[1]-a[1]});
    if (ipArr.length > 0) {
      html += '<div class="section-title" style="margin-top:24px">Viewer Fingerprints</div>';
      html += '<table class="data-table"><thead><tr><th>IP Address</th><th>User Agent</th><th>Events</th></tr></thead><tbody>';
      for (var n = 0; n < ipArr.length; n++) {
        var ua = (ipAgents[ipArr[n][0]] || '').replace(/Mozilla\/5\.0\s*/,'');
        html += '<tr><td class="ip-cell">' + esc(ipArr[n][0]) + '</td>';
        html += '<td class="ua-cell">' + esc(ua.substring(0,100)) + '</td>';
        html += '<td class="count-cell">' + ipArr[n][1] + '</td></tr>';
      }
      html += '</tbody></table>';
    }

    el.innerHTML = html;
  } catch (e2) {
    console.error('Proposal data error:', e2);
    renderError(el, 'Failed to load proposal data: ' + e2.message);
  }
}

// ── SYSTEM ──
async function loadSystem() {
  var el = document.getElementById('system-content');
  try {
    var results = await Promise.all([
      sbFetch('v_cron_status', 'select=*'),
      sbFetch('v_skill_usage', 'order=trigger_count.desc&limit=50')
    ]);
    var crons = results[0];
    var skills = results[1];
    if ((!crons || crons.length === 0) && (!skills || skills.length === 0)) {
      renderEmpty(el, 'No system data available');
      return;
    }
    el.className = '';
    var html = '';

    // Cron jobs
    if (crons && crons.length > 0) {
      html += '<div class="section-title">pg_cron Jobs</div>';
      html += '<table class="data-table"><thead><tr><th>Job</th><th>Schedule</th><th>Status</th><th>Last Run</th><th>Message</th></tr></thead><tbody>';
      for (var i = 0; i < crons.length; i++) {
        var c = crons[i];
        var statusBadge = 'badge-muted';
        if (c.status === 'succeeded') statusBadge = 'badge-green';
        else if (c.status === 'failed') statusBadge = 'badge-red';
        else if (c.status === 'running') statusBadge = 'badge-orange';
        html += '<tr style="animation-delay:' + (i*0.05) + 's;opacity:0;animation:fadeUp 0.4s ease forwards">';
        html += '<td style="font-weight:500;color:var(--accent)">' + esc(c.jobname) + '</td>';
        html += '<td style="color:var(--muted);font-size:11px">' + esc(c.schedule) + '</td>';
        html += '<td><span class="badge ' + statusBadge + '">' + esc(c.status || 'never run') + '</span></td>';
        html += '<td style="font-size:11px">' + fmtTime(c.start_time) + '</td>';
        var msg = c.return_message || '—';
        if (msg.length > 80) msg = msg.substring(0,80) + '...';
        html += '<td style="color:var(--muted);font-size:10px;max-width:250px">' + esc(msg) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
    }

    // Skill usage
    if (skills && skills.length > 0) {
      html += '<div class="section-title" style="margin-top:28px">Skill Telemetry</div>';
      html += '<table class="data-table"><thead><tr><th>Skill</th><th>Category</th><th>Triggers</th><th>Last Used</th><th>Status</th></tr></thead><tbody>';
      for (var j = 0; j < skills.length; j++) {
        var s = skills[j];
        var sBadge = s.usage_status === 'active' ? 'badge-green' : s.usage_status === 'dormant' ? 'badge-muted' : 'badge-warn';
        html += '<tr style="animation-delay:' + (j*0.03) + 's;opacity:0;animation:fadeUp 0.3s ease forwards">';
        html += '<td style="font-weight:500">' + esc(s.title) + '</td>';
        html += '<td><span class="badge badge-purple">' + esc(s.category || '—') + '</span></td>';
        html += '<td style="color:var(--accent);font-family:Syne,sans-serif;font-weight:800;font-size:16px">' + (s.trigger_count || 0) + '</td>';
        html += '<td style="font-size:11px">' + fmtTime(s.last_triggered_at) + '</td>';
        html += '<td><span class="badge ' + sBadge + '">' + esc(s.usage_status || '—') + '</span></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
    }

    el.innerHTML = html;
  } catch (e) {
    console.error('System error:', e);
    renderError(el, 'Failed to load system data: ' + e.message);
  }
}

// ── Init ──
function updateFooterTime() {
  document.getElementById('footer-time').textContent =
    new Date().toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true, timeZone:'America/New_York' }) + ' ET';
}
updateFooterTime();
setInterval(updateFooterTime, 60000);

// Load all tabs in parallel on init
Promise.all([loadPipeline(), loadSignals(), loadCampaign(), loadProposals(), loadSystem()])
  .catch(function(e) { console.error('Init error:', e); });

// Auto-refresh every 5 minutes
setInterval(function() {
  Promise.all([loadPipeline(), loadSignals(), loadCampaign(), loadProposals(), loadSystem()])
    .catch(function(e) { console.error('Refresh error:', e); });
}, 5 * 60 * 1000);

// Tab from URL
var urlTab = new URLSearchParams(window.location.search).get('tab');
if (urlTab && ['pipeline','signals','campaign','proposals','system'].indexOf(urlTab) >= 0) {
  switchTab(urlTab);
}
</script>
