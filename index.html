<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beacon Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
    --border: #2e3348; --text: #e4e4e7; --muted: #8b8fa3;
    --accent: #6366f1; --accent2: #818cf8; --hot: #ef4444;
    --warm: #f59e0b; --cool: #22c55e; --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { color: var(--accent2); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: var(--border); }
  .last-updated { font-size: 12px; color: var(--muted); }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

  /* KPI Bar */
  .kpi-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .kpi-value { font-size: 28px; font-weight: 700; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Proposal Selector */
  .proposal-selector { margin-bottom: 24px; display: flex; gap: 8px; flex-wrap: wrap; }
  .proposal-tab { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .proposal-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .proposal-tab:hover:not(.active) { border-color: var(--accent2); color: var(--text); }

  /* Grid Layout */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-full { margin-bottom: 20px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
  .card-body { padding: 20px; }

  /* Heatmap */
  .heatmap-row { display: flex; align-items: center; margin-bottom: 8px; gap: 12px; }
  .heatmap-label { width: 200px; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .heatmap-bar-wrap { flex: 1; height: 28px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
  .heatmap-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; min-width: 2px; }
  .heatmap-count { width: 40px; font-size: 12px; text-align: right; color: var(--muted); flex-shrink: 0; }

  /* Timeline */
  .timeline-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--surface2); gap: 12px; }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-time { width: 140px; font-size: 12px; color: var(--muted); flex-shrink: 0; font-family: monospace; }
  .timeline-event { font-size: 13px; flex: 1; }
  .timeline-meta { font-size: 11px; color: var(--muted); }

  /* Visitor Table */
  .vtable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .vtable th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .vtable td { padding: 10px 12px; border-bottom: 1px solid var(--surface2); }
  .vtable tr:hover td { background: var(--surface2); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-mobile { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .badge-desktop { background: rgba(34,197,94,0.15); color: var(--cool); }
  .badge-event { background: rgba(59,130,246,0.15); color: var(--blue); }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .loading .spinner { width: 32px; height: 32px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* Chart area for time distribution */
  .hour-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; padding-top: 8px; }
  .hour-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .hour-bar { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.4s ease; min-height: 2px; }
  .hour-label { font-size: 9px; color: var(--muted); margin-top: 4px; }

  .device-chart { display: flex; gap: 20px; align-items: center; justify-content: center; padding: 10px 0; }
  .device-stat { text-align: center; }
  .device-pct { font-size: 32px; font-weight: 700; }
  .device-label { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Beacon</span> Dashboard</h1>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
</div>

<div class="container">
  <div class="kpi-bar" id="kpiBar"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  <div class="proposal-selector" id="proposalSelector"></div>
  <div id="dashContent"></div>
</div>

<script>
const SUPABASE_URL = 'https://cnplogkxbjecdeeritdl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNucGxvZ2t4YmplY2RlZXJpdGRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMjAzMTUsImV4cCI6MjA4Nzg5NjMxNX0.WJ6edMljHiY-fku9G2OWm83y5wHWI5yZHvxtpYMCuWU';

let allData = [];
let campaignData = [];
let activeProposal = null;

async function sbFetch(table, params = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

async function loadData() {
  document.getElementById('kpiBar').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  allData = await sbFetch('proposal_engagement', 'select=*&order=created_at.desc&limit=5000');
  campaignData = await sbFetch('campaign_events', 'select=*&order=created_at.desc&limit=1000');
  document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  renderKPIs();
  renderProposalTabs();
  renderDashboard();
}

function renderKPIs() {
  const proposals = [...new Set(allData.map(d => d.proposal_id))];
  const sessions = [...new Set(allData.map(d => d.session_id))];
  const ips = [...new Set(allData.filter(d => d.visitor_ip).map(d => d.visitor_ip))];
  const mobileCount = allData.filter(d => d.user_agent && /mobile|android|iphone|ipad/i.test(d.user_agent));
  const mobileSessions = [...new Set(mobileCount.map(d => d.session_id))].length;
  const desktopSessions = sessions.length - mobileSessions;
  const timeEvents = allData.filter(d => d.event_type === 'time_on_slide' && d.duration_seconds);
  const totalTime = timeEvents.reduce((s, d) => s + Number(d.duration_seconds), 0);

  document.getElementById('kpiBar').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Proposals</div><div class="kpi-value">${proposals.length}</div><div class="kpi-sub">tracked</div></div>
    <div class="kpi-card"><div class="kpi-label">Sessions</div><div class="kpi-value">${sessions.length}</div><div class="kpi-sub">${ips.length} unique IPs</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Events</div><div class="kpi-value">${allData.length}</div><div class="kpi-sub">${campaignData.length} campaign</div></div>
    <div class="kpi-card"><div class="kpi-label">Mobile / Desktop</div><div class="kpi-value">${mobileSessions} / ${desktopSessions}</div><div class="kpi-sub">sessions</div></div>
    <div class="kpi-card"><div class="kpi-label">Dwell Time</div><div class="kpi-value">${totalTime > 60 ? Math.round(totalTime / 60) + 'm' : totalTime + 's'}</div><div class="kpi-sub">total time on slides</div></div>
  `;
}

function renderProposalTabs() {
  const proposals = [...new Set(allData.map(d => d.proposal_id))];
  if (!activeProposal && proposals.length) activeProposal = proposals[0];
  const tabs = proposals.map(p => {
    const count = allData.filter(d => d.proposal_id === p).length;
    return `<div class="proposal-tab ${p === activeProposal ? 'active' : ''}" onclick="activeProposal='${p}';renderProposalTabs();renderDashboard()">${p} <span style="opacity:0.6">(${count})</span></div>`;
  }).join('');
  document.getElementById('proposalSelector').innerHTML = tabs;
}

function renderDashboard() {
  const data = allData.filter(d => d.proposal_id === activeProposal);
  if (!data.length) { document.getElementById('dashContent').innerHTML = '<div class="empty">No data for this proposal</div>'; return; }

  document.getElementById('dashContent').innerHTML = `
    <div class="grid-2">
      <div class="card"><div class="card-header">Slide Engagement Heatmap <span style="font-size:11px;color:var(--muted)">views</span></div><div class="card-body" id="heatmap"></div></div>
      <div class="card"><div class="card-header">Time on Slide <span style="font-size:11px;color:var(--muted)">seconds</span></div><div class="card-body" id="timeHeatmap"></div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-header">Activity by Hour</div><div class="card-body" id="hourChart"></div></div>
      <div class="card"><div class="card-header">Device Breakdown</div><div class="card-body" id="deviceChart"></div></div>
    </div>
    <div class="grid-full">
      <div class="card"><div class="card-header">Visitor Sessions</div><div class="card-body" id="visitorTable"></div></div>
    </div>
    <div class="grid-full">
      <div class="card"><div class="card-header">Event Timeline <span style="font-size:11px;color:var(--muted)">latest 50</span></div><div class="card-body" id="timeline"></div></div>
    </div>
  `;

  renderHeatmap(data);
  renderTimeHeatmap(data);
  renderHourChart(data);
  renderDeviceChart(data);
  renderVisitorTable(data);
  renderTimeline(data);
}

function renderHeatmap(data) {
  const views = data.filter(d => d.event_type === 'slide_viewed');
  const slides = {};
  views.forEach(d => {
    const key = d.slide_number;
    if (!slides[key]) slides[key] = { title: d.slide_title || `Slide ${key}`, count: 0 };
    slides[key].count++;
  });
  const sorted = Object.entries(slides).sort((a, b) => Number(a[0]) - Number(b[0]));
  const max = Math.max(...sorted.map(s => s[1].count), 1);

  document.getElementById('heatmap').innerHTML = sorted.length ? sorted.map(([num, s]) => {
    const pct = (s.count / max * 100);
    const intensity = Math.round(pct);
    const color = intensity > 70 ? 'var(--hot)' : intensity > 40 ? 'var(--warm)' : 'var(--accent)';
    return `<div class="heatmap-row">
      <div class="heatmap-label" title="${s.title}">${num}. ${s.title}</div>
      <div class="heatmap-bar-wrap"><div class="heatmap-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="heatmap-count">${s.count}</div>
    </div>`;
  }).join('') : '<div class="empty">No slide views</div>';
}

function renderTimeHeatmap(data) {
  const times = data.filter(d => d.event_type === 'time_on_slide' && d.duration_seconds);
  const slides = {};
  times.forEach(d => {
    const key = d.slide_number;
    if (!slides[key]) slides[key] = { title: d.slide_title || `Slide ${key}`, total: 0 };
    slides[key].total += Number(d.duration_seconds);
  });
  const sorted = Object.entries(slides).sort((a, b) => Number(a[0]) - Number(b[0]));
  const max = Math.max(...sorted.map(s => s[1].total), 1);

  document.getElementById('timeHeatmap').innerHTML = sorted.length ? sorted.map(([num, s]) => {
    const pct = (s.total / max * 100);
    const intensity = Math.round(pct);
    const color = intensity > 70 ? 'var(--hot)' : intensity > 40 ? 'var(--warm)' : 'var(--cool)';
    return `<div class="heatmap-row">
      <div class="heatmap-label" title="${s.title}">${num}. ${s.title}</div>
      <div class="heatmap-bar-wrap"><div class="heatmap-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="heatmap-count">${Math.round(s.total)}s</div>
    </div>`;
  }).join('') : '<div class="empty">No time data yet</div>';
}

function renderHourChart(data) {
  const hours = new Array(24).fill(0);
  data.forEach(d => { const h = new Date(d.created_at).getHours(); hours[h]++; });
  const max = Math.max(...hours, 1);

  document.getElementById('hourChart').innerHTML = `<div class="hour-chart">${
    hours.map((c, h) => {
      const pct = (c / max * 100);
      const color = c > 0 ? 'var(--accent)' : 'var(--surface2)';
      return `<div class="hour-bar-wrap"><div class="hour-bar" style="height:${Math.max(pct, 3)}%;background:${color}" title="${h}:00 — ${c} events"></div><div class="hour-label">${h}</div></div>`;
    }).join('')
  }</div>`;
}

function renderDeviceChart(data) {
  const sessions = {};
  data.forEach(d => {
    if (!sessions[d.session_id]) {
      const mobile = d.user_agent && /mobile|android|iphone|ipad/i.test(d.user_agent);
      sessions[d.session_id] = mobile ? 'mobile' : 'desktop';
    }
  });
  const total = Object.keys(sessions).length || 1;
  const mobile = Object.values(sessions).filter(v => v === 'mobile').length;
  const desktop = total - mobile;

  document.getElementById('deviceChart').innerHTML = `<div class="device-chart">
    <div class="device-stat"><div class="device-pct" style="color:var(--accent2)">${Math.round(mobile/total*100)}%</div><div class="device-label">Mobile (${mobile})</div></div>
    <div style="width:1px;height:50px;background:var(--border)"></div>
    <div class="device-stat"><div class="device-pct" style="color:var(--cool)">${Math.round(desktop/total*100)}%</div><div class="device-label">Desktop (${desktop})</div></div>
  </div>`;
}

function renderVisitorTable(data) {
  const sessions = {};
  data.forEach(d => {
    if (!sessions[d.session_id]) sessions[d.session_id] = { ip: d.visitor_ip, ua: d.user_agent, events: 0, slides: new Set(), first: d.created_at, last: d.created_at };
    const s = sessions[d.session_id];
    s.events++;
    if (d.slide_number !== null) s.slides.add(d.slide_number);
    if (d.created_at < s.first) s.first = d.created_at;
    if (d.created_at > s.last) s.last = d.created_at;
  });

  const rows = Object.entries(sessions).sort((a, b) => new Date(b[1].last) - new Date(a[1].last));
  const isMobile = ua => ua && /mobile|android|iphone|ipad/i.test(ua);
  const parseDevice = ua => {
    if (!ua) return 'Unknown';
    if (/iPhone/i.test(ua)) return 'iPhone';
    if (/iPad/i.test(ua)) return 'iPad';
    if (/Android/i.test(ua)) return 'Android';
    if (/Mac/i.test(ua)) return 'Mac';
    if (/Windows/i.test(ua)) return 'Windows';
    return 'Other';
  };
  const parseBrowser = ua => {
    if (!ua) return '';
    if (/CriOS|Chrome/i.test(ua)) return 'Chrome';
    if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) return 'Safari';
    if (/Firefox/i.test(ua)) return 'Firefox';
    if (/Edge/i.test(ua)) return 'Edge';
    return '';
  };

  document.getElementById('visitorTable').innerHTML = `<table class="vtable">
    <thead><tr><th>Session</th><th>IP</th><th>Device</th><th>Slides</th><th>Events</th><th>Last Active</th></tr></thead>
    <tbody>${rows.map(([sid, s]) => `<tr>
      <td style="font-family:monospace;font-size:11px">${sid.slice(0, 20)}</td>
      <td>${s.ip || '<span style="color:var(--muted)">--</span>'}</td>
      <td>${parseDevice(s.ua)} ${parseBrowser(s.ua)} <span class="badge ${isMobile(s.ua) ? 'badge-mobile' : 'badge-desktop'}">${isMobile(s.ua) ? 'Mobile' : 'Desktop'}</span></td>
      <td>${s.slides.size}</td>
      <td>${s.events}</td>
      <td style="font-size:12px;color:var(--muted)">${new Date(s.last).toLocaleString()}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderTimeline(data) {
  const recent = data.slice(0, 50);
  document.getElementById('timeline').innerHTML = recent.map(d => {
    const time = new Date(d.created_at).toLocaleString();
    const label = d.event_type === 'slide_viewed' ? `Viewed slide ${d.slide_number}` :
                  d.event_type === 'time_on_slide' ? `Spent ${d.duration_seconds}s on slide ${d.slide_number}` :
                  d.event_type === 'proposal_opened' ? 'Opened proposal' : d.event_type;
    const title = d.slide_title ? ` — ${d.slide_title}` : '';
    return `<div class="timeline-row">
      <div class="timeline-time">${time}</div>
      <div class="timeline-event"><span class="badge badge-event">${d.event_type}</span> ${label}${title}</div>
      <div class="timeline-meta">${d.visitor_ip || ''}</div>
    </div>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
